<!DOCTYPE html>
<html lang="en">
  <head>
    <title>To-Do List</title> <!-- Title of the web page -->
    <meta charset="UTF-8" /> <!-- Character encoding for the document -->
    <meta name="viewport" content="width=device-width" /> <!-- Responsive design for mobile devices -->
    <link rel="stylesheet" href="styles.css" /> <!-- Link to the external CSS stylesheet -->
  </head>
  <body>
    <section class="container"> <!-- Main container for the to-do list application -->
      <div class="heading"> <!-- Container for the heading section -->
        <img class="heading__img" src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/756881/laptop.svg"> <!-- Image for the heading -->
        <h1 class="heading__title">To-Do List</h1> <!-- Title of the application -->
      </div>
      <form class="form"> <!-- Form for adding new to-do items -->
        <div>
          <label class="form__label" for="todo">~ Today I need to ~</label> <!-- Label for the input field -->
          <input class="form__input"
               type="text"
               id="todo" <!-- Unique identifier for the input field -->
               name="to-do" <!-- Name attribute for the input field -->
               size="30" <!-- Size of the input field -->
               required> <!-- Indicates that this field is required -->
          <button class="button"><span>Submit</span></button> <!-- Submit button for the form -->
        </div>
      </form>
      <div>
        <ul class="toDoList"> <!-- Unordered list to display the to-do items -->
        </ul>
      </div>
    </section>
    <script src="script.js"></script> <!-- Link to the external JavaScript file -->
  </body>
</html>
